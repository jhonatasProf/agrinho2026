<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraViva - Dashboard de Carbono</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">🌱 TerraViva</div>
            <nav>
                <a href="#" class="active">📊 Dashboard</a>
                <a href="#">🗺️ Mapa Interativo</a>
                <a href="#">💰 Créditos</a>
                <a href="#">⚙️ Configurações</a>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <div>
                    <h1>Painel de Créditos de Carbono</h1>
                    <p>Fazenda Horizonte Verde • Cascavel - PR</p>
                </div>
                <button class="btn-export">Exportar Relatório</button>
            </header>

            <section class="cards-grid">
                <div class="card">
                    <h3>Área Preservada</h3>
                    <p class="value">120 <span class="unit">ha</span></p>
                </div>
                <div class="card">
                    <h3>CO₂ Retido</h3>
                    <p class="value">2.450 <span class="unit">Ton</span></p>
                </div>
                <div class="card highlight">
                    <h3>Créditos Gerados</h3>
                    <p class="value">2.450 <span class="unit">CBIO</span></p>
                </div>
                <div class="card profit">
                    <h3>Lucro Estimado</h3>
                    <p class="value">R$ 36.750</p>
                </div>
            </section>

            <section class="chart-section">
                <h2>Crescimento de Retenção de CO₂ (Últimos Anos)</h2>
                
                <form id="carbon-form" style="display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; align-items: flex-end;">
                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <label for="input-ano" style="font-size: 14px; color: #94a3b8;">Ano:</label>
                        <input type="number" id="input-ano" placeholder="Ex: 2027" required style="background: #12141c; border: 1px solid #2d3142; padding: 10px; border-radius: 6px; color: white; width: 110px; font-size: 14px;">
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <label for="input-co2" style="font-size: 14px; color: #94a3b8;">CO₂ Retido (Ton):</label>
                        <input type="number" id="input-co2" placeholder="Ex: 2600" required style="background: #12141c; border: 1px solid #2d3142; padding: 10px; border-radius: 6px; color: white; width: 160px; font-size: 14px;">
                    </div>
                    <button type="submit" style="background-color: #4ade80; color: #12141c; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; height: 39px; transition: 0.3s;">
                        Adicionar Dados
                    </button>
                </form>

                <div class="chart-container">
                    <canvas id="carbonChart"></canvas>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
